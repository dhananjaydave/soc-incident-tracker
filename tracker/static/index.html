<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SOC Incident Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e14; --bg-panel: #10151f; --border: #1f2937;
    --text: #e2e8f0; --text-dim: #8b97a8;
    --accent: #f59e0b; --malicious: #f87171; --suspicious: #fbbf24; --clean: #34d399;
    --mono: 'JetBrains Mono', monospace;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: radial-gradient(ellipse at top, #1a1308 0%, var(--bg) 60%);
    color: var(--text); font-family: 'Inter', system-ui, sans-serif; line-height: 1.6;
  }
  .wrap { max-width: 1000px; margin: 0 auto; padding: 3rem 1.5rem 6rem; }
  h1 { font-size: 1.8rem; margin: 0 0 0.3rem; letter-spacing: -0.02em; }
  .lede { color: var(--text-dim); font-size: 0.95rem; margin-bottom: 2rem; }
  .panel { background: var(--bg-panel); border: 1px solid var(--border); border-radius: 10px; padding: 1.5rem; margin-bottom: 1.5rem; }
  h2 { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--accent); margin: 0 0 1rem; font-weight: 600; }
  label { display: block; font-size: 0.78rem; color: var(--text-dim); margin-bottom: 0.3rem; }
  input, select, textarea {
    width: 100%; background: #0a0e14; border: 1px solid var(--border); border-radius: 6px;
    color: var(--text); padding: 0.6rem 0.8rem; font-family: 'Inter', sans-serif; font-size: 0.9rem; margin-bottom: 0.9rem;
  }
  textarea { font-family: var(--mono); font-size: 0.82rem; min-height: 100px; resize: vertical; }
  input:focus, select:focus, textarea:focus { outline: none; border-color: var(--accent); }
  button {
    background: var(--accent); color: #1a0f02; border: none; border-radius: 6px;
    padding: 0.6rem 1.2rem; font-weight: 600; cursor: pointer; font-size: 0.88rem;
  }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  button.secondary { background: transparent; color: var(--text); border: 1px solid var(--border); }
  button.danger { background: var(--malicious); color: #1a0505; }
  .field-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 0 1rem; }
  .error-text { color: var(--malicious); font-size: 0.85rem; margin-top: 0.5rem; }
  #login-view { max-width: 360px; margin: 6rem auto; }

  .ticket-list { list-style: none; padding: 0; margin: 0; }
  .ticket-list li {
    padding: 0.8rem 0; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between;
    align-items: center; cursor: pointer; font-size: 0.88rem;
  }
  .ticket-list li:hover { color: var(--accent); }
  .ticket-list li:last-child { border-bottom: none; }
  .status-badge {
    font-family: var(--mono); font-size: 0.72rem; padding: 0.2rem 0.55rem; border-radius: 100px; text-transform: uppercase;
  }
  .status-open { background: rgba(251,191,36,0.12); color: var(--suspicious); }
  .status-escalated { background: rgba(248,113,113,0.12); color: var(--malicious); }
  .status-resolved { background: rgba(52,211,153,0.12); color: var(--clean); }
  .status-false_positive { background: rgba(148,163,184,0.12); color: var(--text-dim); }

  .top-bar { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 2rem; }
  .updates-list { list-style: none; padding: 0; margin: 0 0 1rem; }
  .updates-list li { padding: 0.5rem 0; border-bottom: 1px solid var(--border); font-size: 0.85rem; }
  .sop-box { background: #0a0e14; border: 1px solid var(--border); border-radius: 8px; padding: 1rem; font-size: 0.85rem; white-space: pre-wrap; margin-bottom: 1rem; }
  #detail-view { display: none; }
  .back-link { color: var(--accent); cursor: pointer; font-size: 0.85rem; margin-bottom: 1rem; display: inline-block; }
  .action-row { display: flex; gap: 0.6rem; flex-wrap: wrap; margin-top: 0.8rem; }
</style>
</head>
<body>
<div class="wrap">

  <div id="login-view">
    <h1>SOC Incident Tracker</h1>
    <p class="lede">Private dashboard - login required.</p>
    <div class="panel">
      <form id="login-form">
        <label>Username</label>
        <input id="login-username" autocomplete="username" required>
        <label>Password</label>
        <input id="login-password" type="password" autocomplete="current-password" required>
        <button type="submit" id="login-btn">Log in</button>
        <div class="error-text" id="login-error" style="display:none;"></div>
      </form>
    </div>
  </div>

  <div id="dashboard-view" style="display:none;">
    <div class="top-bar">
      <div>
        <h1>SOC Incident Tracker</h1>
        <p class="lede" style="margin:0;">Logged in as <span id="whoami"></span></p>
      </div>
      <button class="secondary" id="logout-btn">Log out</button>
    </div>

    <div id="list-view">
      <div class="panel">
        <h2>New ticket</h2>
        <form id="create-form">
          <div class="field-grid">
            <div>
              <label>Alert type</label>
              <select id="create-alert-type" required></select>
            </div>
            <div>
              <label>Title</label>
              <input id="create-title" required>
            </div>
          </div>
          <label>Description (optional)</label>
          <textarea id="create-description" style="min-height:60px;"></textarea>
          <button type="submit">Create ticket</button>
        </form>
      </div>

      <div class="panel">
        <h2>Tickets</h2>
        <div style="margin-bottom:0.8rem;">
          <button class="secondary" data-filter="">All</button>
          <button class="secondary" data-filter="open">Open</button>
          <button class="secondary" data-filter="escalated">Escalated</button>
          <button class="secondary" data-filter="resolved">Resolved</button>
          <button class="secondary" data-filter="false_positive">False positive</button>
        </div>
        <ul class="ticket-list" id="ticket-list"></ul>
      </div>

      <div class="panel">
        <h2>SOPs</h2>
        <form id="sop-form">
          <div class="field-grid">
            <div>
              <label>Alert type</label>
              <input id="sop-alert-type" required>
            </div>
          </div>
          <label>Steps</label>
          <textarea id="sop-steps" required></textarea>
          <button type="submit">Save SOP</button>
        </form>
        <ul class="updates-list" id="sop-list" style="margin-top:1rem;"></ul>
      </div>
    </div>

    <div id="detail-view">
      <span class="back-link" id="back-link">&larr; Back to tickets</span>
      <div class="panel">
        <h2 id="detail-title"></h2>
        <p id="detail-meta" style="font-size:0.85rem; color:var(--text-dim);"></p>
        <p id="detail-description"></p>
        <div id="detail-sop-wrap" style="display:none;">
          <label>SOP for this alert type</label>
          <div class="sop-box" id="detail-sop"></div>
        </div>
        <div class="action-row">
          <button id="action-escalate">Escalate</button>
          <button id="action-resolve">Resolve</button>
          <button class="secondary" id="action-falsepositive">False positive</button>
        </div>
      </div>
      <div class="panel">
        <h2>Update notes</h2>
        <ul class="updates-list" id="detail-updates"></ul>
        <form id="note-form">
          <textarea id="note-text" placeholder="Add a note..." required style="min-height:60px;"></textarea>
          <button type="submit">Add note</button>
        </form>
      </div>
    </div>
  </div>

</div>

<script>
  const loginView = document.getElementById('login-view');
  const dashboardView = document.getElementById('dashboard-view');
  const listView = document.getElementById('list-view');
  const detailView = document.getElementById('detail-view');

  function clearChildren(el) { while (el.firstChild) el.removeChild(el.firstChild); }

  async function api(path, options = {}) {
    const resp = await fetch(path, { ...options, headers: { 'Content-Type': 'application/json', ...(options.headers || {}) } });
    if (resp.status === 401) { showLogin(); throw new Error('Not authenticated'); }
    const data = await resp.json().catch(() => ({}));
    if (!resp.ok) throw new Error(data.detail || `Error ${resp.status}`);
    return data;
  }

  function showLogin() {
    loginView.style.display = 'block';
    dashboardView.style.display = 'none';
  }

  async function showDashboard() {
    loginView.style.display = 'none';
    dashboardView.style.display = 'block';
    const me = await api('/api/me');
    document.getElementById('whoami').textContent = me.username;
    await loadSops();
    await loadTickets('');
  }

  document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const errorBox = document.getElementById('login-error');
    errorBox.style.display = 'none';
    const btn = document.getElementById('login-btn');
    btn.disabled = true;
    try {
      await api('/login', {
        method: 'POST',
        body: JSON.stringify({
          username: document.getElementById('login-username').value,
          password: document.getElementById('login-password').value,
        }),
      });
      await showDashboard();
    } catch (err) {
      errorBox.textContent = err.message;
      errorBox.style.display = 'block';
    } finally {
      btn.disabled = false;
    }
  });

  document.getElementById('logout-btn').addEventListener('click', async () => {
    await api('/logout', { method: 'POST' });
    showLogin();
  });

  let sopCache = [];

  async function loadSops() {
    sopCache = await api('/api/sops');
    const select = document.getElementById('create-alert-type');
    clearChildren(select);
    for (const sop of sopCache) {
      const opt = document.createElement('option');
      opt.value = sop.alert_type;
      opt.textContent = sop.alert_type;
      select.appendChild(opt);
    }
    const sopList = document.getElementById('sop-list');
    clearChildren(sopList);
    for (const sop of sopCache) {
      const li = document.createElement('li');
      li.textContent = sop.alert_type;
      sopList.appendChild(li);
    }
  }

  document.getElementById('sop-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    await api('/api/sops', {
      method: 'POST',
      body: JSON.stringify({
        alert_type: document.getElementById('sop-alert-type').value,
        steps: document.getElementById('sop-steps').value,
      }),
    });
    document.getElementById('sop-form').reset();
    await loadSops();
  });

  function formatTimestamp(iso) {
    return new Date(iso).toLocaleString();
  }

  async function loadTickets(status) {
    const tickets = await api('/api/incidents' + (status ? `?status=${status}` : ''));
    const list = document.getElementById('ticket-list');
    clearChildren(list);
    for (const t of tickets) {
      const li = document.createElement('li');
      const left = document.createElement('span');
      left.textContent = `#${t.id} [${t.alert_type}] ${t.title}`;
      const badge = document.createElement('span');
      badge.className = 'status-badge status-' + t.status;
      badge.textContent = t.status.replace('_', ' ');
      li.appendChild(left);
      li.appendChild(badge);
      li.addEventListener('click', () => showDetail(t.id));
      list.appendChild(li);
    }
  }

  document.querySelectorAll('[data-filter]').forEach(btn => {
    btn.addEventListener('click', () => loadTickets(btn.dataset.filter));
  });

  document.getElementById('create-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    await api('/api/incidents', {
      method: 'POST',
      body: JSON.stringify({
        alert_type: document.getElementById('create-alert-type').value,
        title: document.getElementById('create-title').value,
        description: document.getElementById('create-description').value || null,
      }),
    });
    document.getElementById('create-form').reset();
    await loadTickets('');
  });

  let currentTicketId = null;

  async function showDetail(id) {
    currentTicketId = id;
    const data = await api(`/api/incidents/${id}`);
    listView.style.display = 'none';
    detailView.style.display = 'block';

    document.getElementById('detail-title').textContent = `#${data.incident.id} [${data.incident.alert_type}] ${data.incident.title}`;
    document.getElementById('detail-meta').textContent =
      `Status: ${data.incident.status} | Created: ${formatTimestamp(data.incident.created_at)} | Updated: ${formatTimestamp(data.incident.updated_at)}`;
    document.getElementById('detail-description').textContent = data.incident.description || '(no description)';

    const sopWrap = document.getElementById('detail-sop-wrap');
    if (data.sop) {
      sopWrap.style.display = 'block';
      document.getElementById('detail-sop').textContent = data.sop.steps;
    } else {
      sopWrap.style.display = 'none';
    }

    const updatesList = document.getElementById('detail-updates');
    clearChildren(updatesList);
    if (data.updates.length === 0) {
      const li = document.createElement('li');
      li.textContent = 'No update notes yet.';
      updatesList.appendChild(li);
    }
    for (const u of data.updates) {
      const li = document.createElement('li');
      li.textContent = `${formatTimestamp(u.created_at)}: ${u.note}`;
      updatesList.appendChild(li);
    }
  }

  document.getElementById('back-link').addEventListener('click', () => {
    detailView.style.display = 'none';
    listView.style.display = 'block';
    loadTickets('');
  });

  async function setStatus(status) {
    let reason = null;
    if (status !== 'open') {
      reason = prompt(`Reason for marking this ${status.replace('_', ' ')}?`) || null;
    }
    await api(`/api/incidents/${currentTicketId}/status`, {
      method: 'POST', body: JSON.stringify({ status, reason }),
    });
    await showDetail(currentTicketId);
  }

  document.getElementById('action-escalate').addEventListener('click', () => setStatus('escalated'));
  document.getElementById('action-resolve').addEventListener('click', () => setStatus('resolved'));
  document.getElementById('action-falsepositive').addEventListener('click', () => setStatus('false_positive'));

  document.getElementById('note-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const textEl = document.getElementById('note-text');
    await api(`/api/incidents/${currentTicketId}/notes`, {
      method: 'POST', body: JSON.stringify({ note: textEl.value }),
    });
    textEl.value = '';
    await showDetail(currentTicketId);
  });

  // On load, check if already logged in (session cookie still valid).
  api('/api/me').then(showDashboard).catch(() => showLogin());
</script>
</body>
</html>
